<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factory Passport</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-4 md:p-6">
    <header class="mb-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-3xl md:text-4xl font-bold tracking-tight">Factory Passport</h1>
          <p class="text-slate-400 mt-1">
            Human-in-the-loop snapshots for AI software factories.
          </p>
        </div>

        <div class="flex flex-wrap gap-2">
          <button onclick="exportRun()" class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700">
            Export JSON
          </button>

          <label class="px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 cursor-pointer">
            Import JSON
            <input type="file" accept="application/json" class="hidden" onchange="importRun(event)" />
          </label>

          <button onclick="copyShareUrl()" class="px-4 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500">
            Copy Share URL
          </button>
        </div>
      </div>
    </header>

    <section class="grid lg:grid-cols-3 gap-4 mb-6">
      <div class="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-2xl p-4">
        <h2 class="font-semibold text-xl mb-3">Create Factory Run</h2>

        <textarea
          id="ideaInput"
          class="w-full min-h-28 p-3 rounded-xl bg-slate-950 border border-slate-700 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Paste a vague idea, feature request, or GitHub issue here..."
        ></textarea>

        <div class="flex flex-wrap gap-2 mt-3">
          <button onclick="createRun()" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-500 font-medium">
            Start Run
          </button>

          <button onclick="resetRun()" class="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-500 font-medium">
            Reset
          </button>
        </div>
      </div>

      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4">
        <h2 class="font-semibold text-xl mb-3">Factory Fingerprint</h2>
        <div id="insights" class="space-y-2 text-sm text-slate-300"></div>
      </div>
    </section>

    <main>
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-xl">Pipeline Snapshots</h2>
        <span id="runId" class="text-xs text-slate-500"></span>
      </div>

      <div id="board" class="grid md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
    </main>
  </div>

  <script>
    const stages = [
      "Idea",
      "Spec",
      "Plan",
      "Patch",
      "Test",
      "Preview",
      "Approve"
    ];

    let run = {
      id: null,
      createdAt: null,
      snapshots: []
    };

    function now() {
      return new Date().toLocaleString();
    }

    function makeSnapshot(stage, input = "", output = "") {
      return {
        id: crypto.randomUUID(),
        stage,
        input,
        output,
        notes: "",
        status: "pending",
        retries: 0,
        parentId: run.snapshots.at(-1)?.id || null,
        createdAt: now(),
        updatedAt: now()
      };
    }

    function createRun() {
      const idea = document.getElementById("ideaInput").value.trim();

      if (!idea) {
        alert("Add an idea or issue first.");
        return;
      }

      run = {
        id: "run-" + Date.now(),
        createdAt: now(),
        snapshots: stages.map((stage, index) => {
          if (index === 0) {
            return makeSnapshot("Idea", "User input", idea);
          }

          return makeSnapshot(stage, stages[index - 1], "");
        })
      };

      run.snapshots[0].status = "approved";
      saveRun();
      render();
    }

    function render() {
      document.getElementById("runId").textContent = run.id ? `Run: ${run.id}` : "No active run";

      const board = document.getElementById("board");
      board.innerHTML = "";

      run.snapshots.forEach((snapshot, index) => {
        const card = document.createElement("section");
        card.className = "bg-slate-900 border border-slate-800 rounded-2xl p-4";

        card.innerHTML = `
          <div class="flex items-start justify-between gap-3 mb-3">
            <div>
              <h3 class="text-lg font-semibold">${index + 1}. ${snapshot.stage}</h3>
              <p class="text-xs text-slate-500">Updated: ${snapshot.updatedAt}</p>
            </div>
            <span class="text-xs px-2 py-1 rounded-full ${statusClass(snapshot.status)}">
              ${snapshot.status}
            </span>
          </div>

          <label class="text-xs text-slate-400">Input</label>
          <textarea
            class="w-full mt-1 mb-3 min-h-20 p-2 rounded-xl bg-slate-950 border border-slate-700 text-sm"
            onchange="updateSnapshot('${snapshot.id}', 'input', this.value)"
          >${escapeHtml(snapshot.input)}</textarea>

          <label class="text-xs text-slate-400">Output</label>
          <textarea
            class="w-full mt-1 mb-3 min-h-28 p-2 rounded-xl bg-slate-950 border border-slate-700 text-sm"
            placeholder="Agent output, human edit, validation result, Render preview URL..."
            onchange="updateSnapshot('${snapshot.id}', 'output', this.value)"
          >${escapeHtml(snapshot.output)}</textarea>

          <label class="text-xs text-slate-400">Human Notes</label>
          <textarea
            class="w-full mt-1 mb-3 min-h-16 p-2 rounded-xl bg-slate-950 border border-slate-700 text-sm"
            placeholder="Why approved, rejected, retried, or changed..."
            onchange="updateSnapshot('${snapshot.id}', 'notes', this.value)"
          >${escapeHtml(snapshot.notes)}</textarea>

          <div class="flex flex-wrap gap-2">
            <button onclick="approveSnapshot('${snapshot.id}')" class="px-3 py-2 rounded-xl bg-emerald-700 hover:bg-emerald-600 text-sm">
              Approve
            </button>

            <button onclick="rejectSnapshot('${snapshot.id}')" class="px-3 py-2 rounded-xl bg-red-700 hover:bg-red-600 text-sm">
              Reject
            </button>

            <button onclick="retrySnapshot('${snapshot.id}')" class="px-3 py-2 rounded-xl bg-amber-600 hover:bg-amber-500 text-sm">
              Retry
            </button>

            <button onclick="forkSnapshot('${snapshot.id}')" class="px-3 py-2 rounded-xl bg-indigo-700 hover:bg-indigo-600 text-sm">
              Fork
            </button>
          </div>

          <div class="mt-3 text-xs text-slate-500">
            Retries: ${snapshot.retries} · Parent: ${snapshot.parentId || "none"}
          </div>
        `;

        board.appendChild(card);
      });

      renderInsights();
    }

    function statusClass(status) {
      if (status === "approved") return "bg-emerald-500/20 text-emerald-300";
      if (status === "rejected") return "bg-red-500/20 text-red-300";
      if (status === "retrying") return "bg-amber-500/20 text-amber-200";
      return "bg-slate-700 text-slate-300";
    }

    function updateSnapshot(id, field, value) {
      const snapshot = run.snapshots.find(s => s.id === id);
      if (!snapshot) return;

      snapshot[field] = value;
      snapshot.updatedAt = now();
      saveRun();
      renderInsights();
    }

    function approveSnapshot(id) {
      const snapshot = run.snapshots.find(s => s.id === id);
      snapshot.status = "approved";
      snapshot.updatedAt = now();
      saveRun();
      render();
    }

    function rejectSnapshot(id) {
      const snapshot = run.snapshots.find(s => s.id === id);
      snapshot.status = "rejected";
      snapshot.updatedAt = now();
      saveRun();
      render();
    }

    function retrySnapshot(id) {
      const snapshot = run.snapshots.find(s => s.id === id);
      snapshot.status = "retrying";
      snapshot.retries += 1;
      snapshot.updatedAt = now();
      saveRun();
      render();
    }

    function forkSnapshot(id) {
      const snapshot = run.snapshots.find(s => s.id === id);
      const copy = {
        ...snapshot,
        id: crypto.randomUUID(),
        parentId: snapshot.id,
        stage: snapshot.stage + " Fork",
        status: "pending",
        createdAt: now(),
        updatedAt: now()
      };

      run.snapshots.splice(run.snapshots.indexOf(snapshot) + 1, 0, copy);
      saveRun();
      render();
    }

    function renderInsights() {
      const total = run.snapshots.length;
      const approved = run.snapshots.filter(s => s.status === "approved").length;
      const rejected = run.snapshots.filter(s => s.status === "rejected").length;
      const retrying = run.snapshots.filter(s => s.status === "retrying").length;
      const retries = run.snapshots.reduce((sum, s) => sum + s.retries, 0);
      const completion = total ? Math.round((approved / total) * 100) : 0;

      document.getElementById("insights").innerHTML = `
        <div class="flex justify-between"><span>Snapshots</span><strong>${total}</strong></div>
        <div class="flex justify-between"><span>Approved</span><strong>${approved}</strong></div>
        <div class="flex justify-between"><span>Rejected</span><strong>${rejected}</strong></div>
        <div class="flex justify-between"><span>Retrying</span><strong>${retrying}</strong></div>
        <div class="flex justify-between"><span>Total Retries</span><strong>${retries}</strong></div>
        <div class="flex justify-between"><span>Completion</span><strong>${completion}%</strong></div>

        <div class="mt-3 h-3 bg-slate-800 rounded-full overflow-hidden">
          <div class="h-full bg-emerald-500" style="width:${completion}%"></div>
        </div>
      `;
    }

    function exportRun() {
      const blob = new Blob([JSON.stringify(run, null, 2)], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${run.id || "factory-passport-run"}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importRun(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        try {
          run = JSON.parse(reader.result);
          saveRun();
          render();
        } catch {
          alert("Invalid JSON file.");
        }
      };

      reader.readAsText(file);
    }

    function copyShareUrl() {
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(run))));
      const url = `${location.origin}${location.pathname}#run=${encoded}`;

      navigator.clipboard.writeText(url).then(() => {
        alert("Share URL copied.");
      });
    }

    function loadFromHash() {
      if (!location.hash.startsWith("#run=")) return false;

      try {
        const encoded = location.hash.replace("#run=", "");
        run = JSON.parse(decodeURIComponent(escape(atob(encoded))));
        saveRun();
        return true;
      } catch {
        alert("Could not load shared run.");
        return false;
      }
    }

    function saveRun() {
      localStorage.setItem("factory-passport-run", JSON.stringify(run));
    }

    function loadRun() {
      const saved = localStorage.getItem("factory-passport-run");
      if (saved) run = JSON.parse(saved);
    }

    function resetRun() {
      if (!confirm("Reset this Factory Passport run?")) return;

      run = {
        id: null,
        createdAt: null,
        snapshots: []
      };

      localStorage.removeItem("factory-passport-run");
      location.hash = "";
      render();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    if (!loadFromHash()) {
      loadRun();
    }

    render();
  </script>
</body>
</html>
